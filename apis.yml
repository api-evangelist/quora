apis:
- aid: quora:quora-ads-conversion-api
  name: Quora Ads Conversion API
  tags:
  - Advertising
  - Conversions
  - Marketing
  humanURL: https://www.quora.com/ads/conversion_api_doc
  properties:
  - url: https://www.quora.com/ads/conversion_api_doc
    type: Documentation
  - url: https://quoraadsupport.zendesk.com/hc/en-us/articles/23065751885069-Conversion-API-Overview
    type: GettingStarted
  - url: https://business.quora.com/api-partners
    type: Partners
  description: >-
    The Quora Ads Conversion API (CAPI) allows advertisers to send events such
    as website events, app installs, and offline conversions directly to Quora
    Ads Manager. This server-to-server integration enables real-time data
    connections that improve conversion match rates, increasing return on ad
    spend (ROAS) and lowering cost per action (CPA). Authentication is handled
    via an API access token generated in the Conversion API tab of Quora Ads
    Manager, and requests must include the API token, ad account ID, and the
    Quora click ID (qclid) captured from ad interactions.
- aid: quora:poe-api
  name: Poe API
  tags:
  - AI
  - Large Language Models
  - Chatbots
  - Generative AI
  humanURL: https://creator.poe.com/
  baseURL: https://api.poe.com/v1
  properties:
  - url: https://creator.poe.com/docs
    type: Documentation
  - url: https://creator.poe.com/docs/quick-start
    type: GettingStarted
  - url: https://creator.poe.com/api-reference
    type: OpenAPI
  - url: https://creator.poe.com/docs/external-applications/openai-compatible-api
    type: OpenAICompatible
  - url: https://creator.poe.com/docs/external-applications/anthropic-compatible-api
    type: AnthropicCompatible
  - url: https://creator.poe.com/docs/server-bots/poe-protocol-specification
    type: Specification
  - url: https://creator.poe.com/docs/server-bots/fastapi_poe-python-reference
    type: SDKs
  - url: https://creator.poe.com/docs/resources/usage-api
    type: UsageAPI
  - url: https://creator.poe.com/changelog
    type: ChangeLog
  - url: https://poe.com/api/keys
    type: Authentication
  - url: https://github.com/poe-platform/fastapi_poe
    type: SDKs
  description: >-
    The Poe API is a developer platform by Quora that provides access to
    hundreds of AI models and bots through a single OpenAI-compatible interface.
    Developers can access frontier models from major labs including Claude,
    GPT-4, Gemini, and open-source models, as well as millions of
    community-created bots, all through one API key and billing system. The
    platform supports text, image, video, and audio generation modalities. The
    API also enables developers to build and deploy server bots using the
    fastapi-poe Python library, and supports the Poe Protocol for advanced bot
    integration. Rate limits are set at 500 requests per minute, and
    authentication uses a Poe API key passed as a Bearer token or via the
    standard OpenAI-compatible header.
