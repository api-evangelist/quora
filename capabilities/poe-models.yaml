naftiko: 1.0.0-alpha2
info:
  label: Poe API — Models
  description: 'Poe API — Models. 1 operations. Lead operation: List models. Self-contained Naftiko capability covering one
    Quora business surface.'
  tags:
  - Quora
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUORA_API_KEY: QUORA_API_KEY
capability:
  consumes:
  - type: http
    namespace: poe-models
    baseUri: https://api.poe.com/v1
    description: Poe API — Models business capability. Self-contained, no shared references.
    resources:
    - name: models
      path: /models
      operations:
      - name: listmodels
        method: GET
        description: List models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QUORA_API_KEY}}'
  exposes:
  - type: rest
    namespace: poe-models-rest
    port: 8080
    description: REST adapter for Poe API — Models. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/models
      name: models
      description: REST surface for models.
      operations:
      - method: GET
        name: listmodels
        description: List models
        call: poe-models.listmodels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: poe-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Poe API — Models. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-models
      description: List models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: poe-models.listmodels
      outputParameters:
      - type: object
        mapping: $.
