naftiko: 1.0.0-alpha2
info:
  label: Poe API — Chat
  description: 'Poe API — Chat. 1 operations. Lead operation: Create a chat completion. Self-contained Naftiko capability
    covering one Quora business surface.'
  tags:
  - Quora
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUORA_API_KEY: QUORA_API_KEY
capability:
  consumes:
  - type: http
    namespace: poe-chat
    baseUri: https://api.poe.com/v1
    description: Poe API — Chat business capability. Self-contained, no shared references.
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: Create a chat completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.QUORA_API_KEY}}'
  exposes:
  - type: rest
    namespace: poe-chat-rest
    port: 8080
    description: REST adapter for Poe API — Chat. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: REST surface for chat-completions.
      operations:
      - method: POST
        name: createchatcompletion
        description: Create a chat completion
        call: poe-chat.createchatcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: poe-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Poe API — Chat. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-chat-completion
      description: Create a chat completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: poe-chat.createchatcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
